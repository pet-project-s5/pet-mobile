version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  Cuddle Pet-Shop — Stack completo
#
#  Serviços:
#    db   → PostgreSQL 15
#    api  → TypeScript + Express + Prisma (pet-api-ts), porta 8080
#    web  → Expo web (react-native-web), porta 8081
#
#  Variáveis de ambiente:
#    Copie .env.example → .env na raiz e preencha os valores.
#    Todas as chaves vêm deste único .env — não edite os .env dos subprojetos
#    para uso com Docker.
#
#  Como usar:
#    docker compose up --build          # sobe tudo
#    docker compose up --build web      # só rebuilda o front
#    docker compose up db api           # só back-end
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: cuddle-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-petapi}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API TypeScript + Express + Prisma ───────────────────────────────────────
  api:
    build:
      context: ./pet-api-ts
      dockerfile: Dockerfile
    container_name: cuddle-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-root}@db:5432/${POSTGRES_DB:-petapi}
      JWT_SECRET:   ${JWT_SECRET:-troque_por_uma_chave_longa_e_aleatoria}
      PORT: 8080
      TZ: America/Sao_Paulo
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Front-end Expo Web ──────────────────────────────────────────────────────
  web:
    build:
      context: ./cuddle
      dockerfile: Dockerfile.web
      args:
        # Injetada no bundle Expo em tempo de build — vem do .env raiz
        EXPO_PUBLIC_GROQ_API_KEY: ${GROQ_API_KEY:-}
    container_name: cuddle-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8081:8081"

volumes:
  pgdata:
